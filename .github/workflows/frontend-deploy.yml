name: Frontend Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "frontend-pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: https://nativeglow.onrender.com/api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build -- --base=/NativeGlow/

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Add nojekyll
        run: touch dist/.nojekyll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: https://arunkumar-webdevelop.github.io/NativeGlow/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist-out

      - name: Publish build into docs on main
        run: |
          cd "$GITHUB_WORKSPACE"
          rm -rf docs
          mkdir -p docs
          cp -r dist-out/. docs/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- docs; then
            echo "No docs changes to commit."
            exit 0
          fi

          git add docs
          git commit -m "deploy: update frontend site in docs [skip ci]"
          git push

      - name: Show deployed frontend URL
        run: |
          echo "Frontend URL: https://arunkumar-webdevelop.github.io/NativeGlow/"
          echo "## Frontend Deploy URL" >> "$GITHUB_STEP_SUMMARY"
          echo "https://arunkumar-webdevelop.github.io/NativeGlow/" >> "$GITHUB_STEP_SUMMARY"
