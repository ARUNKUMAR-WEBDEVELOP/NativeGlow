name: Frontend Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "frontend-pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for GitHub Pages
        env:
          VITE_API_BASE: https://nativeglow.onrender.com/api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build -- --base=/NativeGlow/

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Add nojekyll
        run: touch dist/.nojekyll

      - name: Publish to gh-pages branch
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TMP_DIR="$(mktemp -d)"
          cp -r frontend/dist/. "$TMP_DIR/"

          git checkout --orphan gh-pages-temp
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx
          cp -r "$TMP_DIR"/. .
          touch .nojekyll
          git add .
          git commit -m "deploy: frontend to gh-pages"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-temp:gh-pages
          git checkout -f main
          git branch -D gh-pages-temp
          rm -rf "$TMP_DIR"
